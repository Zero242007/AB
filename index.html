<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>For Abir 💖</title>

  <!-- Google Fonts: Poppins -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Tailwind CSS (via CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#540863',
            secondary: '#92487a',
            accent: '#e49ba6',
            bgpink: '#ffd3d5',
          },
          fontFamily: {
            sans: ['Poppins', 'sans-serif'],
          },
          animation: {
            'float': 'float 3s ease-in-out infinite',
            'shake': 'shake 0.5s cubic-bezier(.36,.07,.19,.97) both',
            'pulse-glow': 'pulseGlow 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
          },
          keyframes: {
            float: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-15px)' },
            },
            shake: {
              '10%, 90%': { transform: 'translate3d(-2px, 0, 0)' },
              '20%, 80%': { transform: 'translate3d(4px, 0, 0)' },
              '30%, 50%, 70%': { transform: 'translate3d(-8px, 0, 0)' },
              '40%, 60%': { transform: 'translate3d(8px, 0, 0)' }
            },
            pulseGlow: {
              '0%, 100%': { boxShadow: '0 0 15px 5px rgba(228, 155, 166, 0.4)' },
              '50%': { boxShadow: '0 0 25px 10px rgba(228, 155, 166, 0.8)' },
            }
          }
        }
      }
    }
  </script>

  <!-- Custom CSS for additional animations and glassmorphism -->
  <link rel="stylesheet" href="./styles.css" />

  <!-- React & ReactDOM (via CDN) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <!-- Babel for JSX (via CDN) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Canvas Confetti for extra cute effects -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

</head>

<body class="bg-gradient-to-br from-bgpink via-pink-100 to-pink-200 min-h-screen text-primary overflow-hidden">

  <div id="root"></div>

  <!-- Load the React application -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const validAnswers = [
      "abderrahmane", "ayab", "abdou", "abodi", "aboudi", "daddy", "dodo",
      "عبد الرحمان", "عبدو", "عبدرحمان", "دادي", "دادي عبدالرحمان",
      "كتكوتي", "بسبوس", "مشموش", "mommy's boy", "mommy's good boy",
      "my good boy", "good boy"
    ];

    const romanticMessages = [
      "راك دايما في بالي 💖",
      "نحبك بزاف 🥺💕",
      "انتي احلى حاجة صراتلي ✨",
      "ضحكتك تسوى الدنيا وما فيها 😍",
      "توحشتك يا عمري 🥺",
      "You are my everything 💕",
      "My beautiful princess 👑💖"
    ];

    // Reusable Button Component
    const Button = ({ onClick, children, disabled, className = "" }) => (
      <button
        onClick={onClick}
        disabled={disabled}
        className={`glass-button px-8 py-3 rounded-full font-bold text-lg flex items-center justify-center gap-2 ${className}`}
      >
        {children}
      </button>
    );

    // Particle Generator Component
    const Particles = () => {
      const emojis = ['✨', '💖', '🌸', '🥺', '💕'];

      return (
        <div className="absolute inset-0 overflow-hidden pointer-events-none">
          {[...Array(15)].map((_, i) => {
            const left = Math.random() * 100;
            const delay = Math.random() * 10;
            const duration = 10 + Math.random() * 10;
            const emoji = emojis[Math.floor(Math.random() * emojis.length)];

            return (
              <div
                key={i}
                className="particle text-2xl absolute bottom-0"
                style={{
                  left: `${left}%`,
                  animationDuration: `${duration}s`,
                  animationDelay: `${delay}s`,
                }}
              >
                {emoji}
              </div>
            );
          })}
        </div>
      );
    };

    // 1. Welcome Screen
    const WelcomeScreen = ({ onNext }) => {
      return (
        <div className="page-enter flex flex-col items-center justify-center max-w-md w-full z-10 text-center">

          {/* Avatar Container */}
          <div className="relative mb-8 animate-float">
            <div className="absolute inset-0 bg-accent rounded-full blur-xl opacity-50 animate-pulse-glow"></div>
            <img
              src="./assets/avatar.png"
              alt="Abir Avatar"
              className="relative w-48 h-48 rounded-full object-cover border-4 border-white shadow-2xl z-10"
            />

            {/* Floating stickers around avatar */}
            <div className="absolute -top-4 -right-4 text-4xl animate-bounce" style={{ animationDelay: '0.2s' }}>✨</div>
            <div className="absolute -bottom-2 -left-4 text-4xl animate-bounce" style={{ animationDelay: '0.5s' }}>💖</div>
            <div className="absolute top-1/2 -right-8 text-3xl animate-bounce" style={{ animationDelay: '0.8s' }}>🌸</div>
          </div>

          <div className="glass-card p-8 w-full mb-8">
            <h1 className="text-3xl font-extrabold text-primary mb-4 leading-tight">
              Welcome <br /> <span className="text-secondary text-4xl">Abir Beldjilali 💖✨</span>
            </h1>
            <p className="text-gray-700 font-medium mb-2">A special little place just for you...</p>
          </div>

          <Button onClick={onNext} className="w-full sm:w-auto">
            Next ➡️
          </Button>

        </div>
      );
    };

    // 2. Question Screen
    const QuestionScreen = ({ onNext }) => {
      const [answer, setAnswer] = useState("");
      const [isWrong, setIsWrong] = useState(false);
      const [wrongCount, setWrongCount] = useState(0);
      const [isCorrect, setIsCorrect] = useState(false);
      const [shake, setShake] = useState(false);

      const handleSubmit = (e) => {
        e.preventDefault();
        const cleanAnswer = answer.trim().toLowerCase();

        if (validAnswers.includes(cleanAnswer)) {
          setIsCorrect(true);
          setIsWrong(false);
          // Trigger confetti
          confetti({
            particleCount: 100,
            spread: 70,
            origin: { y: 0.6 },
            colors: ['#540863', '#92487a', '#e49ba6', '#ffd3d5']
          });
        } else {
          setIsWrong(true);
          setWrongCount(prev => prev + 1);
          setShake(true);
          setTimeout(() => setShake(false), 500);
        }
      };

      const getAngryStickerStyle = () => {
        // Move sticker closer to input based on wrong count
        const moveDown = Math.min(wrongCount * 15, 60);
        const scale = Math.min(1 + (wrongCount * 0.1), 1.5);
        return {
          transform: `translateY(${moveDown}px) scale(${scale})`,
          transition: 'all 0.5s cubic-bezier(0.4, 0, 0.2, 1)',
          zIndex: 20
        };
      };

      return (
        <div className="page-enter flex flex-col items-center justify-center max-w-md w-full z-10">

          <div className="glass-card p-8 w-full text-center relative overflow-visible">

            {!isCorrect ? (
              <form onSubmit={handleSubmit} className="flex flex-col items-center">

                {/* Angry sticker that appears and moves down when wrong */}
                <div className="h-24 flex justify-center items-end mb-4 relative w-full">
                  {isWrong ? (
                    <img
                      src="./assets/angry_mouse.png"
                      alt="Angry mouse"
                      className={`w-20 h-20 object-contain absolute -top-12 ${shake ? 'animate-shake' : ''}`}
                      style={getAngryStickerStyle()}
                    />
                  ) : (
                    <div className="text-6xl animate-bounce">🤔</div>
                  )}
                </div>

                <h2 className="text-2xl font-bold text-primary mb-6" dir="rtl">
                  شكون اكثر طفل يحبك؟ 🥺💖
                </h2>

                <div className={`w-full relative ${shake ? 'animate-shake' : ''}`}>
                  <input
                    type="text"
                    value={answer}
                    onChange={(e) => setAnswer(e.target.value)}
                    placeholder="جاوبي هنا..."
                    dir="rtl"
                    className="glass-input w-full px-4 py-3 rounded-xl text-lg text-center font-medium text-primary mb-4"
                  />
                </div>

                {isWrong && (
                  <p className="text-red-500 font-bold mb-4 text-sm animate-pulse">
                    {wrongCount > 3 ? "يا طفلة ركزي شوية! 😤" : "غالطة! عاودي خمي مليح 😒"}
                  </p>
                )}

                <Button onClick={handleSubmit} className="w-full">
                  Submit ✨
                </Button>
              </form>
            ) : (
              <div className="flex flex-col items-center page-enter">
                {/* Success State */}
                <div className="relative mb-6">
                  {/* Speech bubble */}
                  <div className="absolute -top-16 -right-10 bg-white text-secondary font-bold px-4 py-2 rounded-2xl rounded-bl-none shadow-lg transform rotate-6 animate-bounce" style={{ animationDuration: '2s' }}>
                    That's my good girl 💕
                  </div>
                  <img
                    src="./assets/kissing_cat.png"
                    alt="Kissing cat"
                    className="w-40 h-40 object-contain animate-float"
                  />
                </div>

                <h2 className="text-xl font-bold text-primary mb-6" dir="rtl">
                  عبدالرحمان حاب يقولك عفسة 🥺💌
                </h2>

                <Button onClick={onNext} className="w-full animate-pulse-glow">
                  Next 🔓
                </Button>
              </div>
            )}

          </div>
        </div>
      );
    };

    // 3. Love Messages Screen
    const LoveMessagesScreen = () => {
      const [msgIndex, setMsgIndex] = useState(0);
      const [messages, setMessages] = useState([]);

      useEffect(() => {
        // Shuffle messages on load
        const shuffled = [...romanticMessages].sort(() => 0.5 - Math.random());
        setMessages(shuffled);
      }, []);

      const handleNextMessage = () => {
        setMsgIndex((prev) => (prev + 1) % messages.length);
        // Pop some hearts
        confetti({
          particleCount: 30,
          spread: 100,
          origin: { y: 0.8 },
          colors: ['#e49ba6', '#ffd3d5'],
          shapes: ['circle']
        });
      };

      if (messages.length === 0) return null;

      return (
        <div className="page-enter flex flex-col items-center justify-center max-w-md w-full z-10 text-center h-full">

          <div className="absolute top-10 w-full flex justify-center pointer-events-none">
            <div className="text-6xl animate-float" style={{ animationDuration: '4s' }}>💌</div>
          </div>

          <div className="glass-card p-10 w-full min-h-[300px] flex flex-col items-center justify-center relative overflow-hidden group cursor-pointer" onClick={handleNextMessage}>

            {/* Animated background hearts inside card */}
            <div className="absolute -top-5 -left-5 text-4xl opacity-20 group-hover:rotate-12 transition-transform">💖</div>
            <div className="absolute -bottom-5 -right-5 text-5xl opacity-20 group-hover:-rotate-12 transition-transform">✨</div>

            <p
              key={msgIndex} // Key forces re-render/re-animation
              className="text-3xl font-bold text-primary leading-relaxed message-enter"
              dir="rtl"
            >
              {messages[msgIndex]}
            </p>

            <p className="absolute bottom-4 text-sm text-secondary font-medium opacity-60 animate-pulse">
              Click for another message ✨
            </p>
          </div>

        </div>
      );
    };

    // Main App Container
    const App = () => {
      const [screen, setScreen] = useState('welcome'); // 'welcome' | 'question' | 'messages'
      const [exiting, setExiting] = useState(false);

      // Transition handler
      const navigate = (nextScreen) => {
        setExiting(true);
        setTimeout(() => {
          setScreen(nextScreen);
          setExiting(false);
        }, 400); // Matches CSS exit animation duration
      };

      return (
        <div className="relative w-full h-screen flex flex-col items-center justify-center p-4">
          <Particles />

          <div className={`w-full max-w-md flex justify-center transition-opacity duration-400 ${exiting ? 'page-exit' : ''}`}>
            {screen === 'welcome' && <WelcomeScreen onNext={() => navigate('question')} />}
            {screen === 'question' && <QuestionScreen onNext={() => navigate('messages')} />}
            {screen === 'messages' && <LoveMessagesScreen />}
          </div>

        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);

  </script>
</body>

</html>
